<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bleach Fanpage - Selamat Datang</title>
    <style>
        /* Gaya Tampilan Modern & Gelap */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid #ff4500; /* Warna jingga khas Bleach */
        }
        h1 {
            color: #ff4500;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.1rem;
            color: #cccccc;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #ff4500;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s ease;
        }
        .btn:hover {
            background-color: #ff6347;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BLEACH ZONE</h1>
        <p>Selamat datang di proyek website pertamaku! Halaman ini sedang dalam proses pengembangan untuk menjadi tempat berkumpulnya para penggemar anime.</p>
        <a href="#" class="btn">Jelajahi Karakter</a>
    </div>

</body>
</html>
